<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techno-Bakr | AI Operations Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chat-container { height: calc(100vh - 280px); }
        .message-agent { background-color: #1e293b; border-radius: 15px 15px 0 15px; border: 1px solid #334155; }
        .message-user { background-color: #3b82f6; border-radius: 15px 15px 15px 0; }
        .task-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-right: 4px solid #10b981; }
        .email-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-right: 4px solid #3b82f6; }
        .priority-high { border-right-color: #ef4444; }
        .priority-medium { border-right-color: #f59e0b; }
        .priority-low { border-right-color: #10b981; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .tool-badge {
            display: inline-block;
            background: #334155;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 10px;
            margin-right: 8px;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <nav class="bg-slate-900 border-b border-slate-800 p-4 shadow-xl">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-robot text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">تكنو-بكر الذكي</h1>
                    <span class="text-xs text-green-400 flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                        مساعد العمليات متصل
                    </span>
                </div>
            </div>
            <div class="flex gap-2 flex-wrap">
                <button onclick="askAgent('أرسل ايميل إلى yourEmail@test.com يقول: تم تفعيل الوكيل الذكي بنجاح')" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-full border border-slate-700 transition">
                    <i class="fas fa-envelope ml-1"></i> 📧 إرسال ايميل
                </button>
                <button onclick="askAgent('أنشئ تذكرة في Trello: مشكلة في لوحة التحكم للمهندس بكر')" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-full border border-slate-700 transition">
                    <i class="fas fa-ticket-alt ml-1"></i> 🎫 تذكرة Trello
                </button>
                <button onclick="askAgent('قم بترتيب هذه المهام حسب الأولوية: 1- عطل في الخدمة, 2- استفسار عن الأسعار, 3- اقتراح تطوير')" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-full border border-slate-700 transition">
                    <i class="fas fa-chart-line ml-1"></i> 📊 ترتيب الأولويات
                </button>
                <button onclick="askAgent('أعطني ملخصاً لآخر المحادثات')" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-full border border-slate-700 transition">
                    <i class="fas fa-file-alt ml-1"></i> 📝 ملخص الجلسة
                </button>
            </div>
        </div>
    </nav>

    <!-- Chat Area -->
    <main class="flex-grow container mx-auto p-4 md:p-6 overflow-hidden">
        <div id="chat-box" class="chat-container overflow-y-auto space-y-6 pr-2">
            <!-- رسالة ترحيبية -->
            <div class="flex justify-start">
                <div class="p-4 max-w-[85%] shadow-md message-agent">
                    <i class="fas fa-robot text-blue-400 ml-2"></i>
                    مرحباً مهندس بكر. أنا مساعد العمليات الخاص بك.<br>
                    ✉️ يمكنني إرسال الإيميلات<br>
                    🎫 إنشاء تذاكر في Trello<br>
                    📊 ترتيب المهام حسب الأولوية<br>
                    📝 تلخيص المحادثات<br><br>
                    كيف يمكنني مساعدتك الآن؟
                </div>
            </div>
        </div>
        
        <!-- Thinking Indicator -->
        <div id="thinking" class="hidden mt-4 text-slate-400 text-sm flex items-center gap-2">
            <i class="fas fa-cog animate-spin"></i> جاري معالجة العمليات...
        </div>
    </main>

    <!-- Input Area -->
    <footer class="p-4 bg-slate-900/50 backdrop-blur-md border-t border-slate-800">
        <div class="container mx-auto max-w-4xl">
            <div class="relative flex items-center gap-2">
                <input type="text" id="user-input" 
                    class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-4 px-6 focus:outline-none focus:border-blue-500 transition shadow-inner text-white placeholder-slate-500"
                    placeholder="اطلب من الوكيل... مثال: أرسل ايميل إلى test@gmail.com يقول مرحباً"
                    onkeypress="if(event.key === 'Enter') handleSend()">
                <button onclick="handleSend()" 
                    class="bg-blue-600 hover:bg-blue-500 p-4 rounded-xl transition shadow-lg shadow-blue-600/20 active:scale-95">
                    <i class="fas fa-paper-plane text-xl"></i>
                </button>
            </div>
            <div class="flex gap-4 mt-3 px-2 flex-wrap">
                <button onclick="askAgent('أرسل ايميل إلى bakr.muqbil@gmail.com يقول: هذا اختبار من الوكيل الذكي')" class="text-[10px] md:text-xs text-slate-400 hover:text-white transition">
                    <i class="fas fa-envelope mr-1"></i> إرسال ايميل
                </button>
                <button onclick="askAgent('أنشئ تذكرة في Trello: متابعة مشكلة العميل أحمد')" class="text-[10px] md:text-xs text-slate-400 hover:text-white transition">
                    <i class="fas fa-ticket-alt mr-1"></i> تذكرة Trello
                </button>
                <button onclick="askAgent('رتب هذه المهام حسب الأولوية: 1- عطل في نظام الدفع, 2- استفسار عن الباقات, 3- اقتراح لواجهة المستخدم')" class="text-[10px] md:text-xs text-slate-400 hover:text-white transition">
                    <i class="fas fa-chart-line mr-1"></i> ترتيب الأولويات
                </button>
                <button onclick="askAgent('أعطني ملخصاً للمحادثة الحالية')" class="text-[10px] md:text-xs text-slate-400 hover:text-white transition">
                    <i class="fas fa-file-alt mr-1"></i> ملخص الجلسة
                </button>
            </div>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const thinkingIndicator = document.getElementById('thinking');

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            
            appendMessage('user', text);
            userInput.value = '';
            
            thinkingIndicator.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/v1/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: text })
                });
                const data = await response.json();
                
                thinkingIndicator.classList.add('hidden');
                appendMessage('agent', data.ai_response);
                
            } catch (error) {
                thinkingIndicator.classList.add('hidden');
                appendMessage('agent', "عذراً بكر، حدث خطأ تقني في معالجة العمليات.");
            }
        }

        function askAgent(command) {
            userInput.value = command;
            handleSend();
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300`;
            
            // تحديد نوع البطاقة بناءً على المحتوى
            let cardClass = role === 'user' ? 'message-user' : 'message-agent';
            
            if (role === 'agent') {
                if (text.includes("تم إنشاء تذكرة") || text.includes("task_id") || text.includes("Trello")) {
                    cardClass = 'task-card';
                } else if (text.includes("تم إرسال البريد") || text.includes("send_email") || text.includes("إيميل")) {
                    cardClass = 'email-card';
                } else if (text.includes("الأولوية") || text.includes("High") || text.includes("Medium") || text.includes("Low")) {
                    // إضافة تنسيق خاص للأولويات
                    if (text.includes("High")) cardClass = 'task-card priority-high';
                    else if (text.includes("Medium")) cardClass = 'task-card priority-medium';
                    else if (text.includes("Low")) cardClass = 'task-card priority-low';
                    else cardClass = 'task-card';
                }
            }
            
            const innerDiv = document.createElement('div');
            innerDiv.className = `p-4 max-w-[85%] shadow-md ${cardClass}`;
            
            // معالجة النص لعرضه بشكل أفضل
            let formattedText = text;
            
            // تحويل الروابط إلى عناصر قابلة للنقر
            formattedText = formattedText.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="text-blue-400 underline break-all">$1</a>');
            
            // تحويل النص JSON إلى عرض منظم
            if (formattedText.includes('"status": "success"') || formattedText.includes('"priority"')) {
                innerDiv.innerHTML = `<pre class="whitespace-pre-wrap text-sm font-mono">${formattedText}</pre>`;
            } else {
                innerDiv.innerHTML = formattedText;
            }
            
            div.appendChild(innerDiv);
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
